<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlowForge — Workflow Automation</title>
<style>
:root{--bg:#fff;--bg2:#f5f7fa;--card:#fff;--text:#1a1a2e;--text2:#6b7280;--muted:#9ca3af;--pri:#2563eb;--pri-h:#1d4ed8;--pri-l:#dbeafe;--bdr:#e5e7eb;--ok:#059669;--ok-bg:#d1fae5;--err:#dc2626;--err-bg:#fee2e2;--wrn:#d97706;--wrn-bg:#fef3c7;--sh:0 1px 3px rgba(0,0,0,.08);--sh2:0 4px 12px rgba(0,0,0,.1);--r:8px}
[data-theme=dark]{--bg:#0f172a;--bg2:#1e293b;--card:#1e293b;--text:#f1f5f9;--text2:#94a3b8;--muted:#64748b;--pri:#3b82f6;--pri-h:#2563eb;--pri-l:#1e3a5f;--bdr:#334155;--ok:#10b981;--ok-bg:#064e3b;--err:#ef4444;--err-bg:#450a0a;--wrn:#f59e0b;--wrn-bg:#451a03;--sh:0 1px 3px rgba(0,0,0,.3);--sh2:0 4px 12px rgba(0,0,0,.4)}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s}
button{cursor:pointer;font-family:inherit}input,select,textarea{font-family:inherit;font-size:14px}
.app{display:flex;flex-direction:column;min-height:100vh}.nav{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:var(--card);border-bottom:1px solid var(--bdr);box-shadow:var(--sh);position:sticky;top:0;z-index:100}
.brand{font-size:20px;font-weight:700;color:var(--pri);display:flex;align-items:center;gap:8px;cursor:pointer}.brand svg{width:22px;height:22px}
.nav-r{display:flex;align-items:center;gap:12px}.main{flex:1;max-width:1100px;width:100%;margin:0 auto;padding:24px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r);font-size:14px;font-weight:500;border:1px solid transparent;transition:all .15s}
.btn-p{background:var(--pri);color:#fff;border-color:var(--pri)}.btn-p:hover{background:var(--pri-h)}
.btn-s{background:var(--bg2);color:var(--text);border-color:var(--bdr)}.btn-s:hover{background:var(--bdr)}
.btn-d{background:var(--err);color:#fff}.btn-d:hover{opacity:.9}.btn-sm{padding:5px 10px;font-size:12px}
.btn-i{background:none;border:none;color:var(--text2);padding:6px;border-radius:50%}.btn-i:hover{background:var(--bg2);color:var(--text)}
.card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);box-shadow:var(--sh)}.card-h{padding:16px 20px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between}.card-b{padding:20px}
.fg{margin-bottom:16px}.fg label{display:block;margin-bottom:4px;font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.fc{width:100%;padding:9px 12px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--bg);color:var(--text);transition:border-color .15s}.fc:focus{outline:none;border-color:var(--pri);box-shadow:0 0 0 3px var(--pri-l)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.pw-rules{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.6}.pw-rule{transition:color .2s}.pw-ok{color:var(--ok)}.pw-fail{color:var(--err)}
/* Auth */
.ac{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg2)}.ac-card{width:420px}.ac-card .card-b{padding:32px}
.ac-card h1{font-size:24px;margin-bottom:4px}.ac-card p{color:var(--text2);margin-bottom:24px;font-size:14px}
.ae{background:var(--err-bg);color:var(--err);padding:8px 12px;border-radius:var(--r);font-size:13px;margin-bottom:16px;display:none}
.switch-link{text-align:center;margin-top:16px;font-size:13px;color:var(--text2)}.switch-link a{color:var(--pri);font-weight:600;cursor:pointer}
/* Dashboard */
.dh{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}.dh h1{font-size:24px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}.st{padding:16px;text-align:center}.sv{font-size:28px;font-weight:700;color:var(--pri)}.sl{font-size:12px;color:var(--text2);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
/* Workflow List */
.wi{display:grid;grid-template-columns:1fr auto auto auto auto;align-items:center;gap:16px;padding:14px 20px;border-bottom:1px solid var(--bdr);transition:background .1s;cursor:pointer}.wi:hover{background:var(--bg2)}.wi:last-child{border-bottom:none}
.wn{font-weight:600;font-size:15px}.wm{font-size:12px;color:var(--text2)}
.badge{display:inline-block;padding:3px 8px;border-radius:12px;font-size:11px;font-weight:600;text-transform:uppercase}
.b-ok{background:var(--ok-bg);color:var(--ok)}.b-err{background:var(--err-bg);color:var(--err)}.b-wrn{background:var(--wrn-bg);color:var(--wrn)}.b-def{background:var(--bg2);color:var(--text2)}
/* Detail */
.dth{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}.dth h1{font-size:22px}
.di{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px}.di .ii label{font-size:11px;text-transform:uppercase;color:var(--muted);letter-spacing:.5px}.di .ii p{font-size:14px;font-weight:500;margin-top:2px}
.tl{display:flex;flex-direction:column;gap:8px}.ti{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--bg2);border-radius:var(--r);border:1px solid var(--bdr)}
.tn{width:24px;height:24px;border-radius:50%;background:var(--pri);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.ta{color:var(--muted);text-align:center;font-size:18px}
/* Logs */
.ei{border:1px solid var(--bdr);border-radius:var(--r);margin-bottom:10px;overflow:hidden}.eh{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--bg2);cursor:pointer}.eh:hover{background:var(--bdr)}
.el{padding:12px 16px;background:var(--bg);font-family:'Cascadia Code','Fira Code',monospace;font-size:12px;line-height:1.7;max-height:300px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;border-top:1px solid var(--bdr);display:none}.el.open{display:block}
.ll{padding:1px 0}.l-e{color:var(--err);font-weight:600}.l-s{color:var(--ok)}.l-w{color:var(--wrn)}.l-i{color:var(--pri)}
/* Task Builder */
.tb{padding:12px;background:var(--bg2);border-radius:var(--r);border:1px solid var(--bdr);margin-bottom:8px;position:relative}.tb .rt{position:absolute;top:8px;right:8px}
.pr{display:flex;gap:8px;margin-bottom:4px}.pr input{flex:1;padding:6px 8px;font-size:12px}
.empty{text-align:center;padding:48px 20px;color:var(--text2)}.empty svg{width:48px;height:48px;margin-bottom:12px;opacity:.4}.empty h3{margin-bottom:8px;color:var(--text)}
.spin{display:inline-block;width:16px;height:16px;border:2px solid var(--bdr);border-top-color:var(--pri);border-radius:50%;animation:sp .6s linear infinite}@keyframes sp{to{transform:rotate(360deg)}}
.tm{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center}.tm svg{width:18px;height:18px}
@media(max-width:768px){.stats{grid-template-columns:repeat(2,1fr)}.wi{grid-template-columns:1fr auto}.fr{grid-template-columns:1fr}.di{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="app"></div>
<script>
const A='';let U=null,S=localStorage.getItem('ff_s'),T=localStorage.getItem('ff_t')||'light';
document.documentElement.setAttribute('data-theme',T);
const MI='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/></svg>';
const SI='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
const LI='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>';
function tgl(){T=T==='light'?'dark':'light';document.documentElement.setAttribute('data-theme',T);localStorage.setItem('ff_t',T);const b=document.querySelector('.tm');if(b)b.innerHTML=T==='dark'?SI:MI}
async function ap(m,p,b){const o={method:m,headers:{'Content-Type':'application/json'}};if(S)o.headers['Authorization']='Bearer '+S;if(b)o.body=JSON.stringify(b);const r=await fetch(A+p,o);const d=await r.json();if(!r.ok)throw new Error(d.error||'Request failed');return d}
let P={};function nav(pg,pr={}){P=pr;ren(pg)}function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function sb(s){if(s==='COMPLETED')return'b-ok';if(s==='FAILED')return'b-err';if(s==='RUNNING')return'b-wrn';return'b-def'}
function nb(){return`<div class="nav"><div class="brand" onclick="nav('dash')">${LI} FlowForge</div><div class="nav-r"><span style="font-size:13px;color:var(--text2)">Hi, ${esc(U?.displayName||'')}</span><button class="btn-i tm" onclick="tgl()">${T==='dark'?SI:MI}</button><button class="btn btn-s btn-sm" onclick="lo()">Sign Out</button></div></div>`}
function fl(s){if(!s)return'<span style="color:var(--muted)">No logs</span>';return s.split('\n').map(l=>{let c='';if(/ERROR|FAIL|ALERT/.test(l))c='l-e';else if(/SUCCESS|COMPLETED|completed/.test(l))c='l-s';else if(/WARN|NOTIFY/.test(l))c='l-w';else if(/LOG:|Pipeline/.test(l))c='l-i';return'<div class="ll '+c+'">'+esc(l)+'</div>'}).join('')}

function ren(pg){const a=document.getElementById('app');if(!U&&pg!=='auth'){renderAuth();return}
switch(pg){case'auth':renderAuth();break;case'detail':renderDetail(P.id);break;case'create':renderCreate();break;default:renderDash()}}

// === AUTH ===
function renderAuth(){document.getElementById('app').innerHTML=`<div class="ac"><div class="card ac-card"><div class="card-b">
<div style="text-align:center;margin-bottom:20px"><div style="display:inline-flex;align-items:center;gap:8px;color:var(--pri)">${LI}<span style="font-size:24px;font-weight:700">FlowForge</span></div>
<p style="margin-top:8px">Workflow automation, simplified.</p>
<button class="btn-i tm" onclick="tgl()" style="margin-top:4px">${T==='dark'?SI:MI}</button></div>
<div class="ae" id="ae"></div><div id="af"></div></div></div></div>`;showLogin()}

function showLogin(){document.getElementById('af').innerHTML=`
<div class="fg"><label>Username</label><input class="fc" id="lu" placeholder="Enter username"></div>
<div class="fg"><label>Password</label><input class="fc" id="lp" type="password" placeholder="Enter password"></div>
<button class="btn btn-p" style="width:100%;justify-content:center;padding:10px" onclick="doLogin()">Sign In</button>
<div class="switch-link">New user? <a onclick="showSignup()">Create an account</a></div>`;
document.getElementById('ae').style.display='none'}

function showSignup(){document.getElementById('af').innerHTML=`
<div class="fg"><label>Display Name</label><input class="fc" id="sn" placeholder="Your full name"></div>
<div class="fg"><label>Username</label><input class="fc" id="su" placeholder="Choose a username (letters, numbers, _)"></div>
<div class="fg"><label>Password</label><input class="fc" id="sp" type="password" placeholder="Min 6 chars" oninput="checkPw(this.value)">
<div class="pw-rules" id="pwr"><span class="pw-rule" id="pw1">✗ At least 6 characters</span><br><span class="pw-rule" id="pw2">✗ One uppercase letter</span><br><span class="pw-rule" id="pw3">✗ One number</span><br><span class="pw-rule" id="pw4">✗ One special character (!@#$%^&*)</span></div></div>
<button class="btn btn-p" style="width:100%;justify-content:center;padding:10px" onclick="doSignup()">Create Account</button>
<div class="switch-link">Already have an account? <a onclick="showLogin()">Sign in</a></div>`;
document.getElementById('ae').style.display='none'}

function checkPw(v){
const r=(id,ok)=>{const e=document.getElementById(id);e.className='pw-rule '+(ok?'pw-ok':'pw-fail');e.textContent=(ok?'✓':'✗')+' '+e.textContent.substring(2)};
r('pw1',v.length>=6);r('pw2',/[A-Z]/.test(v));r('pw3',/[0-9]/.test(v));r('pw4',/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(v))}

async function doLogin(){try{const d=await ap('POST','/api/auth/login',{username:document.getElementById('lu').value,password:document.getElementById('lp').value});
S=d.sessionId;localStorage.setItem('ff_s',S);U={username:d.username,displayName:d.displayName};nav('dash')}catch(e){showErr(e.message)}}

async function doSignup(){try{const d=await ap('POST','/api/auth/signup',{username:document.getElementById('su').value,password:document.getElementById('sp').value,displayName:document.getElementById('sn').value});
S=d.sessionId;localStorage.setItem('ff_s',S);U={username:d.username,displayName:d.username};nav('dash')}catch(e){showErr(e.message)}}

function showErr(m){const e=document.getElementById('ae');e.textContent=m;e.style.display='block'}
function lo(){ap('POST','/api/auth/logout').catch(()=>{});S=null;U=null;localStorage.removeItem('ff_s');nav('auth')}

// === DASHBOARD ===
async function renderDash(){document.getElementById('app').innerHTML=`<div class="app">${nb()}<div class="main"><div class="dh"><h1>My Workflows</h1><button class="btn btn-p" onclick="nav('create')">+ New Workflow</button></div><div class="stats" id="sts"></div><div class="card"><div class="card-h"><span style="font-weight:600">All Workflows</span></div><div id="wl" style="padding:0"><div style="padding:20px;text-align:center"><div class="spin"></div></div></div></div></div></div>`;
try{const w=await ap('GET','/api/workflows');rWL(w);rSt(w)}catch(e){if(e.message.includes('Not auth')){U=null;nav('auth')}else{document.getElementById('wl').innerHTML='<div style="padding:20px;color:var(--err)">'+e.message+'</div>'}}}

function rSt(w){const t=w.length,c=w.filter(x=>x.lastStatus==='COMPLETED').length,f=w.filter(x=>x.lastStatus==='FAILED').length,x=w.reduce((s,v)=>s+v.executionCount,0);
document.getElementById('sts').innerHTML=`<div class="card st"><div class="sv">${t}</div><div class="sl">Workflows</div></div><div class="card st"><div class="sv">${x}</div><div class="sl">Executions</div></div><div class="card st"><div class="sv" style="color:var(--ok)">${c}</div><div class="sl">Succeeded</div></div><div class="card st"><div class="sv" style="color:var(--err)">${f}</div><div class="sl">Failed</div></div>`}

function rWL(w){const e=document.getElementById('wl');if(!w.length){e.innerHTML=`<div class="empty">${LI}<h3>No workflows yet</h3><p>Create your first workflow to get started</p></div>`;return}
e.innerHTML=w.map(v=>`<div class="wi" onclick="nav('detail',{id:'${v.id}'})"><div><div class="wn">${esc(v.name)}</div><div class="wm">${v.taskCount} tasks · ${v.strategy} · ${v.triggerType}</div></div><span class="badge ${sb(v.lastStatus)}">${v.lastStatus}</span><span style="font-size:12px;color:var(--text2)">${v.executionCount} runs</span><button class="btn btn-sm btn-p" onclick="event.stopPropagation();qr('${v.id}','${esc(v.name)}')">▶ Run</button><button class="btn btn-sm btn-d" onclick="event.stopPropagation();dw('${v.id}')">✕</button></div>`).join('')}

async function qr(id,n){if(!confirm('Run "'+n+'"?'))return;try{await ap('POST','/api/workflows/'+id+'/run')}catch(e){}nav('detail',{id})}
async function dw(id){if(!confirm('Delete this workflow?'))return;try{await ap('DELETE','/api/workflows/'+id);nav('dash')}catch(e){alert(e.message)}}

// === DETAIL ===
async function renderDetail(id){document.getElementById('app').innerHTML=`<div class="app">${nb()}<div class="main"><div class="spin"></div></div></div>`;
try{const w=await ap('GET','/api/workflows/'+id);const m=document.querySelector('.main');
m.innerHTML=`<div class="dth"><div><a href="#" onclick="nav('dash');return false" style="font-size:13px;color:var(--text2)">← Back to workflows</a><h1 style="margin-top:4px">${esc(w.name)}</h1></div><button class="btn btn-p" onclick="rf('${w.id}')">▶ Run Now</button></div>
<div class="di"><div class="ii"><label>Trigger</label><p>${w.triggerType} ${w.triggerValue?'('+esc(w.triggerValue)+')':''}</p></div><div class="ii"><label>Strategy</label><p>${w.strategy}</p></div><div class="ii"><label>Status</label><p><span class="badge ${sb(w.lastStatus)}">${w.lastStatus}</span></p></div></div>
<div class="card" style="margin-bottom:20px"><div class="card-h"><span style="font-weight:600">Tasks (${w.tasks.length})</span></div><div class="card-b"><div class="tl">${w.tasks.map((t,i)=>`${i>0?'<div class="ta">↓</div>':''}<div class="ti"><div class="tn">${i+1}</div><div><div style="font-weight:600;font-size:14px">${esc(t.name)}</div><div style="font-size:12px;color:var(--text2)">${t.type}${Object.keys(t.params||{}).length?' · '+Object.entries(t.params||{}).map(([k,v])=>k+'='+v).join(', '):''}</div></div></div>`).join('')}</div></div></div>
<div class="card"><div class="card-h"><span style="font-weight:600">Execution History (${w.executions.length})</span></div><div class="card-b" id="el">${!w.executions.length?'<div class="empty"><h3>No executions yet</h3><p>Click "Run Now" to execute</p></div>':''}${w.executions.slice().reverse().map(ex=>`<div class="ei"><div class="eh" onclick="this.nextElementSibling.classList.toggle('open')"><div><span class="badge ${sb(ex.status)}">${ex.status}</span><span style="margin-left:8px;font-size:13px;color:var(--text2)">#${ex.executionId} · ${new Date(ex.startedAt).toLocaleString()} · ${ex.durationMs}ms</span></div><span style="font-size:12px;color:var(--muted)">${ex.logCount} lines ▾</span></div><div class="el">${fl(ex.logs)}</div></div>`).join('')}</div></div>`}catch(e){document.querySelector('.main').innerHTML='<div style="color:var(--err);padding:20px">'+e.message+'</div>'}}

async function rf(id){try{await ap('POST','/api/workflows/'+id+'/run')}catch(e){}renderDetail(id)}

// === CREATE ===
let NT=[];
function renderCreate(){NT=[{name:'',type:'http',params:{}}];document.getElementById('app').innerHTML=`<div class="app">${nb()}<div class="main">
<a href="#" onclick="nav('dash');return false" style="font-size:13px;color:var(--text2)">← Back</a><h1 style="margin:8px 0 20px">Create Workflow</h1>
<div class="card"><div class="card-b">
<div class="fg"><label>Workflow Name</label><input class="fc" id="wn" placeholder="e.g., Daily CRM Sync"></div>
<div class="fr"><div class="fg"><label>Trigger Type</label><select class="fc" id="wt" onchange="ttv()"><option value="MANUAL">Manual</option><option value="CRON">Cron Schedule</option><option value="WEBHOOK">Webhook</option><option value="EVENT">Event</option><option value="FILE_WATCH">File Watch</option></select></div>
<div class="fg" id="tvg" style="display:none"><label>Trigger Value</label><input class="fc" id="tv" placeholder="e.g., 0 9 * * *"></div></div>
<div class="fg"><label>Execution Strategy</label><select class="fc" id="ws"><option value="sequential">Sequential</option><option value="parallel">Parallel</option><option value="conditional(skip-delays)">Conditional (skip delays)</option></select></div>
<div class="fg"><label>Tasks</label><div id="tb"></div><button class="btn btn-s btn-sm" style="margin-top:8px" onclick="addT()">+ Add Task</button></div>
</div><div style="padding:12px 20px;border-top:1px solid var(--bdr);display:flex;justify-content:flex-end;gap:8px"><button class="btn btn-s" onclick="nav('dash')">Cancel</button><button class="btn btn-p" onclick="sw()">Create Workflow</button></div></div></div></div>`;rTB()}

function ttv(){document.getElementById('tvg').style.display=document.getElementById('wt').value==='MANUAL'?'none':'block'}
function rTB(){document.getElementById('tb').innerHTML=NT.map((t,i)=>`<div class="tb">${NT.length>1?'<button class="btn-i btn-sm rt" onclick="rmT('+i+')">✕</button>':''}<div class="fr"><div class="fg" style="margin-bottom:8px"><label>Task Name</label><input class="fc" value="${esc(t.name)}" onchange="NT[${i}].name=this.value" placeholder="e.g., Fetch Users"></div><div class="fg" style="margin-bottom:8px"><label>Task Type</label><select class="fc" onchange="NT[${i}].type=this.value;NT[${i}].params={};rTB()"><option ${t.type==='http'?'selected':''}>http</option><option ${t.type==='email'?'selected':''}>email</option><option ${t.type==='transform'?'selected':''}>transform</option><option ${t.type==='database'?'selected':''}>database</option><option ${t.type==='delay'?'selected':''}>delay</option><option ${t.type==='ftp'?'selected':''}>ftp</option><option ${t.type==='file_copy'?'selected':''}>file_copy</option><option ${t.type==='file_delete'?'selected':''}>file_delete</option><option ${t.type==='external_service'?'selected':''}>external_service</option></select></div></div><div>${tpf(t.type,i)}</div></div>`).join('')}

function tpf(type,i){const F={http:[['url','URL','https://api.example.com/data'],['method','Method','GET']],email:[['to','To Email','user@example.com'],['subject','Subject','Report Ready']],transform:[['input','Input','raw_data'],['operation','Operation','normalize']],database:[['query','SQL Query','SELECT * FROM users']],delay:[['seconds','Seconds','1']],ftp:[['host','FTP Host','ftp.example.com'],['file','File','data.csv']],file_copy:[['source','Source','/tmp/a.csv'],['destination','Destination','/out/a.csv']],file_delete:[['path','File Path','/tmp/old.csv']],external_service:[['serviceId','Service ID','crm-api'],['operation','Operation','GET'],['path','Path','/data']]};
return(F[type]||[]).map(([k,l,p])=>`<div class="pr"><input class="fc" placeholder="${l}" value="${esc(NT[i].params[k]||'')}" onchange="NT[${i}].params['${k}']=this.value" style="font-size:12px"></div>`).join('')}

function addT(){NT.push({name:'',type:'http',params:{}});rTB()}
function rmT(i){NT.splice(i,1);rTB()}

async function sw(){const n=document.getElementById('wn').value,tt=document.getElementById('wt').value,tv=document.getElementById('tv')?.value||'',s=document.getElementById('ws').value;
if(!n.trim()){alert('Workflow name is required');return}const vt=NT.filter(t=>t.name.trim());if(!vt.length){alert('Add at least one task with a name');return}
try{await ap('POST','/api/workflows',{name:n,triggerType:tt,triggerValue:tv,strategy:s,tasks:vt});nav('dash')}catch(e){alert('Error: '+e.message)}}

// === INIT ===
(async()=>{if(S){try{const m=await ap('GET','/api/auth/me');U=m;nav('dash')}catch(e){S=null;localStorage.removeItem('ff_s');nav('auth')}}else{nav('auth')}})();
</script>
