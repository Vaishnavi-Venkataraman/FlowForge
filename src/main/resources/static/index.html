<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlowForge — Workflow Automation</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#fafbfc;--bg2:#f0f2f5;--card:#fff;--text:#111827;--text2:#6b7280;--muted:#9ca3af;--pri:#2563eb;--pri-h:#1d4ed8;--pri-l:#dbeafe;--pri-g:linear-gradient(135deg,#2563eb,#7c3aed);--bdr:#e5e7eb;--ok:#059669;--ok-bg:#d1fae5;--err:#dc2626;--err-bg:#fee2e2;--wrn:#d97706;--wrn-bg:#fef3c7;--sh:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);--sh2:0 10px 25px rgba(0,0,0,.08);--r:10px;--r2:16px;--font:'DM Sans',sans-serif;--mono:'JetBrains Mono',monospace}
[data-theme=dark]{--bg:#0b1120;--bg2:#151d2e;--card:#1a2332;--text:#e2e8f0;--text2:#94a3b8;--muted:#64748b;--pri:#3b82f6;--pri-h:#60a5fa;--pri-l:#1e3a5f;--pri-g:linear-gradient(135deg,#3b82f6,#8b5cf6);--bdr:#253040;--ok:#10b981;--ok-bg:#064e3b;--err:#ef4444;--err-bg:#450a0a;--wrn:#f59e0b;--wrn-bg:#451a03;--sh:0 1px 3px rgba(0,0,0,.2);--sh2:0 10px 25px rgba(0,0,0,.3)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s}
button{cursor:pointer;font-family:var(--font)}input,select{font-family:var(--font);font-size:14px}
::selection{background:var(--pri);color:#fff}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--muted);border-radius:3px}

.fade-in{animation:fadeIn .3s ease}@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.slide-up{animation:slideUp .4s ease}@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

.nav{display:flex;align-items:center;justify-content:space-between;padding:12px 28px;background:var(--card);border-bottom:1px solid var(--bdr);backdrop-filter:blur(10px);position:sticky;top:0;z-index:100}
.brand{font-size:20px;font-weight:700;color:var(--pri);display:flex;align-items:center;gap:8px;cursor:pointer;transition:transform .15s}.brand:hover{transform:scale(1.02)}
.brand svg{width:22px;height:22px}
.nav-r{display:flex;align-items:center;gap:12px}
.main{max-width:1120px;width:100%;margin:0 auto;padding:28px}

.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:var(--r);font-size:14px;font-weight:600;border:none;transition:all .15s;letter-spacing:.01em}
.btn-p{background:var(--pri-g);color:#fff;box-shadow:0 2px 8px rgba(37,99,235,.3)}.btn-p:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(37,99,235,.4)}
.btn-s{background:var(--bg2);color:var(--text);border:1px solid var(--bdr)}.btn-s:hover{background:var(--bdr)}
.btn-d{background:var(--err);color:#fff}.btn-d:hover{opacity:.85}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-i{background:none;border:none;color:var(--text2);padding:6px;border-radius:50%;transition:all .15s}.btn-i:hover{background:var(--bg2);color:var(--text);transform:scale(1.1)}
.btn-g{background:var(--ok);color:#fff}.btn-g:hover{opacity:.9}

.card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r2);box-shadow:var(--sh);transition:box-shadow .2s}
.card:hover{box-shadow:var(--sh2)}.card-h{padding:16px 22px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;font-weight:600}.card-b{padding:22px}
.fg{margin-bottom:18px}.fg label{display:block;margin-bottom:5px;font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.8px}
.fc{width:100%;padding:10px 14px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--bg);color:var(--text);transition:all .15s}.fc:focus{outline:none;border-color:var(--pri);box-shadow:0 0 0 3px var(--pri-l)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:14px}

.ac{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg2)}
.ac-card{width:440px;border-radius:var(--r2);overflow:hidden}
.ac-card .card-b{padding:36px}
.ae{background:var(--err-bg);color:var(--err);padding:10px 14px;border-radius:var(--r);font-size:13px;margin-bottom:16px}
.switch-link{text-align:center;margin-top:18px;font-size:13px;color:var(--text2)}.switch-link a{color:var(--pri);font-weight:600;cursor:pointer;text-decoration:none}.switch-link a:hover{text-decoration:underline}
.pw-rules{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.7}.pw-ok{color:var(--ok)}.pw-fail{color:var(--err)}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
.st{padding:20px;text-align:center;border-radius:var(--r2)}.sv{font-size:32px;font-weight:700;background:var(--pri-g);background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent}.st:nth-child(3) .sv{background:none;-webkit-text-fill-color:var(--ok)}.st:nth-child(4) .sv{background:none;-webkit-text-fill-color:var(--err)}
.sl{font-size:11px;color:var(--text2);margin-top:4px;text-transform:uppercase;letter-spacing:1px;font-weight:600}

.wi{display:grid;grid-template-columns:1fr auto auto auto auto;align-items:center;gap:16px;padding:16px 22px;border-bottom:1px solid var(--bdr);transition:all .15s;cursor:pointer}.wi:hover{background:var(--bg2);transform:translateX(2px)}.wi:last-child{border-bottom:none}
.wn{font-weight:600;font-size:15px}.wm{font-size:12px;color:var(--text2);margin-top:2px}
.badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.b-ok{background:var(--ok-bg);color:var(--ok)}.b-err{background:var(--err-bg);color:var(--err)}.b-wrn{background:var(--wrn-bg);color:var(--wrn)}.b-def{background:var(--bg2);color:var(--text2)}

.di{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:22px}.ii label{font-size:11px;text-transform:uppercase;color:var(--muted);letter-spacing:.8px;font-weight:600}.ii p{font-size:14px;font-weight:500;margin-top:3px}
.tl{display:flex;flex-direction:column;gap:8px}
.ti{display:flex;align-items:center;gap:14px;padding:12px 16px;background:var(--bg2);border-radius:var(--r);border:1px solid var(--bdr);transition:transform .15s}.ti:hover{transform:translateX(4px)}
.tn{width:28px;height:28px;border-radius:50%;background:var(--pri-g);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.ta{color:var(--muted);text-align:center;font-size:16px}

.ei{border:1px solid var(--bdr);border-radius:var(--r);margin-bottom:10px;overflow:hidden}.eh{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:var(--bg2);cursor:pointer;transition:background .15s}.eh:hover{background:var(--bdr)}
.el{padding:14px 18px;background:var(--bg);font-family:var(--mono);font-size:12px;line-height:1.8;max-height:350px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;border-top:1px solid var(--bdr);display:none}.el.open{display:block}
.ll{padding:2px 0}.l-e{color:var(--err);font-weight:600}.l-s{color:var(--ok)}.l-w{color:var(--wrn)}.l-i{color:var(--pri)}

.tb{padding:14px;background:var(--bg2);border-radius:var(--r);border:1px solid var(--bdr);margin-bottom:10px;position:relative}.tb .rt{position:absolute;top:10px;right:10px}
.empty{text-align:center;padding:52px 20px;color:var(--text2)}.empty h3{margin-bottom:8px;color:var(--text);font-size:18px}.empty p{font-size:14px}
.spinner{display:inline-block;width:20px;height:20px;border:2.5px solid var(--bdr);border-top-color:var(--pri);border-radius:50%;animation:spin .6s linear infinite}
.tm{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:transform .15s}.tm:hover{transform:rotate(30deg)}.tm svg{width:18px;height:18px}
@media(max-width:768px){.stats{grid-template-columns:repeat(2,1fr)}.wi{grid-template-columns:1fr auto}.fr{grid-template-columns:1fr}.di{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ── Icons ──
const BoltIcon = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>;
const MoonIcon = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/></svg>;
const SunIcon = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>;

// ── API ──
let sessionId = localStorage.getItem('ff_s');
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (sessionId) opts.headers['Authorization'] = 'Bearer ' + sessionId;
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

// ── Helpers ──
const badgeClass = s => s === 'COMPLETED' ? 'b-ok' : s === 'FAILED' ? 'b-err' : s === 'RUNNING' ? 'b-wrn' : 'b-def';
const TASK_PARAMS = {
  http: [['url','URL'],['method','Method']],
  email: [['to','To Email'],['subject','Subject']],
  transform: [['input','Input'],['operation','Operation']],
  database: [['query','SQL Query']],
  delay: [['seconds','Seconds']],
  ftp: [['host','FTP Host'],['file','File']],
  file_copy: [['source','Source'],['destination','Destination']],
  file_delete: [['path','File Path']],
  external_service: [['serviceId','Service ID'],['operation','Operation'],['path','Path']]
};

function formatLogs(logStr) {
  if (!logStr) return null;
  return logStr.split('\n').map((line, i) => {
    let cls = '';
    if (/ERROR|FAIL|ALERT/.test(line)) cls = 'l-e';
    else if (/SUCCESS|COMPLETED|completed/.test(line)) cls = 'l-s';
    else if (/WARN|NOTIFY/.test(line)) cls = 'l-w';
    else if (/LOG:|Pipeline|INFO/.test(line)) cls = 'l-i';
    return <div key={i} className={'ll ' + cls}>{line}</div>;
  });
}

// ── Navbar ──
function Navbar({ user, onLogout, theme, onToggleTheme, onHome }) {
  return (
    <div className="nav">
      <div className="brand" onClick={onHome}><BoltIcon /> FlowForge</div>
      <div className="nav-r">
        <span style={{fontSize:13,color:'var(--text2)'}}>Hi, {user?.displayName || ''}</span>
        <button className="btn-i tm" onClick={onToggleTheme}>{theme === 'dark' ? <SunIcon /> : <MoonIcon />}</button>
        <button className="btn btn-s btn-sm" onClick={onLogout}>Sign Out</button>
      </div>
    </div>
  );
}

// ── Auth Page ──
function AuthPage({ onLogin, theme, onToggleTheme }) {
  const [isSignup, setIsSignup] = useState(false);
  const [error, setError] = useState('');
  const [form, setForm] = useState({ username: '', password: '', displayName: '' });
  const [pwChecks, setPwChecks] = useState({ len: false, upper: false, num: false, special: false });

  const updateField = (k, v) => {
    setForm(f => ({ ...f, [k]: v }));
    if (k === 'password') {
      setPwChecks({ len: v.length >= 6, upper: /[A-Z]/.test(v), num: /[0-9]/.test(v), special: /[^a-zA-Z0-9]/.test(v) });
    }
  };

  const handleSubmit = async () => {
    setError('');
    try {
      if (isSignup) {
        const d = await api('POST', '/api/auth/signup', form);
        sessionId = d.sessionId; localStorage.setItem('ff_s', sessionId);
        onLogin({ username: d.username, displayName: form.displayName || d.username });
      } else {
        const d = await api('POST', '/api/auth/login', { username: form.username, password: form.password });
        sessionId = d.sessionId; localStorage.setItem('ff_s', sessionId);
        onLogin({ username: d.username, displayName: d.displayName });
      }
    } catch (e) { setError(e.message); }
  };

  const PwRule = ({ ok, text }) => <span className={ok ? 'pw-ok' : 'pw-fail'}>{ok ? '✓' : '✗'} {text}<br/></span>;

  return (
    <div className="ac">
      <div className="card ac-card slide-up">
        <div className="card-b">
          <div style={{textAlign:'center',marginBottom:24}}>
            <div style={{display:'inline-flex',alignItems:'center',gap:10,color:'var(--pri)'}}>
              <BoltIcon /><span style={{fontSize:26,fontWeight:700}}>FlowForge</span>
            </div>
            <p style={{color:'var(--text2)',marginTop:8,fontSize:14}}>Workflow automation, simplified.</p>
            <button className="btn-i tm" onClick={onToggleTheme} style={{marginTop:6}}>
              {theme === 'dark' ? <SunIcon /> : <MoonIcon />}
            </button>
          </div>
          {error && <div className="ae">{error}</div>}
          {isSignup ? (
            <>
              <div className="fg"><label>Display Name</label><input className="fc" value={form.displayName} onChange={e => updateField('displayName', e.target.value)} placeholder="Your full name"/></div>
              <div className="fg"><label>Username</label><input className="fc" value={form.username} onChange={e => updateField('username', e.target.value)} placeholder="Letters, numbers, _"/></div>
              <div className="fg"><label>Password</label><input className="fc" type="password" value={form.password} onChange={e => updateField('password', e.target.value)} placeholder="Min 6 characters"/>
                <div className="pw-rules"><PwRule ok={pwChecks.len} text="At least 6 characters"/><PwRule ok={pwChecks.upper} text="One uppercase letter"/><PwRule ok={pwChecks.num} text="One number"/><PwRule ok={pwChecks.special} text="One special character"/></div>
              </div>
              <button className="btn btn-p" style={{width:'100%',justifyContent:'center',padding:12}} onClick={handleSubmit}>Create Account</button>
              <div className="switch-link">Already have an account? <a onClick={() => { setIsSignup(false); setError(''); }}>Sign in</a></div>
            </>
          ) : (
            <>
              <div className="fg"><label>Username</label><input className="fc" value={form.username} onChange={e => updateField('username', e.target.value)} placeholder="Enter username" onKeyDown={e => e.key === 'Enter' && handleSubmit()}/></div>
              <div className="fg"><label>Password</label><input className="fc" type="password" value={form.password} onChange={e => updateField('password', e.target.value)} placeholder="Enter password" onKeyDown={e => e.key === 'Enter' && handleSubmit()}/></div>
              <button className="btn btn-p" style={{width:'100%',justifyContent:'center',padding:12}} onClick={handleSubmit}>Sign In</button>
              <div className="switch-link">New user? <a onClick={() => { setIsSignup(true); setError(''); }}>Create an account</a></div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// ── Dashboard ──
function Dashboard({ onNavigate }) {
  const [workflows, setWorkflows] = useState(null);
  const [error, setError] = useState('');

  const load = useCallback(async () => {
    try { setWorkflows(await api('GET', '/api/workflows')); } catch (e) { setError(e.message); }
  }, []);
  useEffect(() => { load(); }, [load]);

  const runWorkflow = async (id) => {
    try { await api('POST', `/api/workflows/${id}/run`); } catch (e) { /* shown in detail */ }
    onNavigate('detail', id);
  };
  const deleteWorkflow = async (id) => {
    if (!confirm('Delete this workflow?')) return;
    try { await api('DELETE', `/api/workflows/${id}`); load(); } catch (e) { alert(e.message); }
  };

  if (error) return <div style={{padding:20,color:'var(--err)'}}>{error}</div>;
  if (!workflows) return <div style={{padding:40,textAlign:'center'}}><div className="spinner"/></div>;

  const total = workflows.length;
  const completed = workflows.filter(w => w.lastStatus === 'COMPLETED').length;
  const failed = workflows.filter(w => w.lastStatus === 'FAILED').length;
  const execs = workflows.reduce((s, w) => s + w.executionCount, 0);

  return (
    <div className="main fade-in">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:22}}>
        <h1 style={{fontSize:26,fontWeight:700}}>My Workflows</h1>
        <button className="btn btn-p" onClick={() => onNavigate('create')}>+ New Workflow</button>
      </div>
      <div className="stats">
        <div className="card st"><div className="sv">{total}</div><div className="sl">Workflows</div></div>
        <div className="card st"><div className="sv">{execs}</div><div className="sl">Executions</div></div>
        <div className="card st"><div className="sv">{completed}</div><div className="sl">Succeeded</div></div>
        <div className="card st"><div className="sv">{failed}</div><div className="sl">Failed</div></div>
      </div>
      <div className="card">
        <div className="card-h">All Workflows</div>
        {workflows.length === 0 ? (
          <div className="empty"><h3>No workflows yet</h3><p>Create your first workflow to get started</p></div>
        ) : workflows.map(w => (
          <div key={w.id} className="wi" onClick={() => onNavigate('detail', w.id)}>
            <div><div className="wn">{w.name}</div><div className="wm">{w.taskCount} tasks · {w.strategy} · {w.triggerType}</div></div>
            <span className={'badge ' + badgeClass(w.lastStatus)}>{w.lastStatus}</span>
            <span style={{fontSize:12,color:'var(--text2)'}}>{w.executionCount} runs</span>
            <button className="btn btn-g btn-sm" onClick={e => { e.stopPropagation(); runWorkflow(w.id); }}>▶ Run</button>
            <button className="btn btn-d btn-sm" onClick={e => { e.stopPropagation(); deleteWorkflow(w.id); }}>✕</button>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Workflow Detail ──
function WorkflowDetail({ workflowId, onBack }) {
  const [wf, setWf] = useState(null);
  const [openLogs, setOpenLogs] = useState({});

  const load = useCallback(async () => {
    try { setWf(await api('GET', `/api/workflows/${workflowId}`)); } catch (e) { /* */ }
  }, [workflowId]);
  useEffect(() => { load(); }, [load]);

  const runNow = async () => {
    try { await api('POST', `/api/workflows/${workflowId}/run`); } catch (e) { /* */ }
    load();
  };

  if (!wf) return <div className="main" style={{textAlign:'center',padding:40}}><div className="spinner"/></div>;

  return (
    <div className="main fade-in">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:22}}>
        <div>
          <a href="#" onClick={e => { e.preventDefault(); onBack(); }} style={{fontSize:13,color:'var(--text2)',textDecoration:'none'}}>← Back to workflows</a>
          <h1 style={{marginTop:4,fontSize:24,fontWeight:700}}>{wf.name}</h1>
        </div>
        <button className="btn btn-p" onClick={runNow}>▶ Run Now</button>
      </div>
      <div className="di">
        <div className="ii"><label>Trigger</label><p>{wf.triggerType} {wf.triggerValue ? `(${wf.triggerValue})` : ''}</p></div>
        <div className="ii"><label>Strategy</label><p>{wf.strategy}</p></div>
        <div className="ii"><label>Status</label><p><span className={'badge ' + badgeClass(wf.lastStatus)}>{wf.lastStatus}</span></p></div>
      </div>
      <div className="card" style={{marginBottom:22}}>
        <div className="card-h">Tasks ({wf.tasks.length})</div>
        <div className="card-b">
          <div className="tl">
            {wf.tasks.map((t, i) => (
              <React.Fragment key={i}>
                {i > 0 && <div className="ta">↓</div>}
                <div className="ti">
                  <div className="tn">{i + 1}</div>
                  <div>
                    <div style={{fontWeight:600,fontSize:14}}>{t.name}</div>
                    <div style={{fontSize:12,color:'var(--text2)'}}>{t.type}{t.params && Object.keys(t.params).length > 0 ? ' · ' + Object.entries(t.params).map(([k,v]) => `${k}=${v}`).join(', ') : ''}</div>
                  </div>
                </div>
              </React.Fragment>
            ))}
          </div>
        </div>
      </div>
      <div className="card">
        <div className="card-h">Execution History ({wf.executions.length})</div>
        <div className="card-b">
          {wf.executions.length === 0 ? <div className="empty"><h3>No executions yet</h3><p>Click "Run Now" to execute</p></div> :
            [...wf.executions].reverse().map(ex => (
              <div key={ex.executionId} className="ei">
                <div className="eh" onClick={() => setOpenLogs(o => ({...o, [ex.executionId]: !o[ex.executionId]}))}>
                  <div>
                    <span className={'badge ' + badgeClass(ex.status)}>{ex.status}</span>
                    <span style={{marginLeft:8,fontSize:13,color:'var(--text2)'}}>#{ex.executionId} · {new Date(ex.startedAt).toLocaleString()} · {ex.durationMs}ms</span>
                  </div>
                  <span style={{fontSize:12,color:'var(--muted)'}}>{ex.logCount} lines {openLogs[ex.executionId] ? '▴' : '▾'}</span>
                </div>
                <div className={'el' + (openLogs[ex.executionId] ? ' open' : '')}>{formatLogs(ex.logs)}</div>
              </div>
            ))
          }
        </div>
      </div>
    </div>
  );
}

// ── Create Workflow ──
function CreateWorkflow({ onBack, onCreated }) {
  const [name, setName] = useState('');
  const [triggerType, setTriggerType] = useState('MANUAL');
  const [triggerValue, setTriggerValue] = useState('');
  const [strategy, setStrategy] = useState('sequential');
  const [tasks, setTasks] = useState([{ name: '', type: 'http', params: {} }]);

  const updateTask = (idx, field, value) => {
    setTasks(ts => ts.map((t, i) => {
      if (i !== idx) return t;
      if (field === 'type') return { ...t, type: value, params: {} };
      if (field === 'name') return { ...t, name: value };
      return { ...t, params: { ...t.params, [field]: value } };
    }));
  };

  const submit = async () => {
    if (!name.trim()) { alert('Workflow name is required'); return; }
    const validTasks = tasks.filter(t => t.name.trim());
    if (!validTasks.length) { alert('Add at least one task with a name'); return; }
    try {
      await api('POST', '/api/workflows', { name, triggerType, triggerValue, strategy, tasks: validTasks });
      onCreated();
    } catch (e) { alert('Error: ' + e.message); }
  };

  return (
    <div className="main fade-in">
      <a href="#" onClick={e => { e.preventDefault(); onBack(); }} style={{fontSize:13,color:'var(--text2)',textDecoration:'none'}}>← Back</a>
      <h1 style={{margin:'8px 0 22px',fontSize:24,fontWeight:700}}>Create Workflow</h1>
      <div className="card">
        <div className="card-b">
          <div className="fg"><label>Workflow Name</label><input className="fc" value={name} onChange={e => setName(e.target.value)} placeholder="e.g., Daily CRM Sync"/></div>
          <div className="fr">
            <div className="fg"><label>Trigger Type</label>
              <select className="fc" value={triggerType} onChange={e => setTriggerType(e.target.value)}>
                <option value="MANUAL">Manual</option><option value="CRON">Cron Schedule</option>
                <option value="WEBHOOK">Webhook</option><option value="EVENT">Event</option><option value="FILE_WATCH">File Watch</option>
              </select>
            </div>
            {triggerType !== 'MANUAL' && <div className="fg"><label>Trigger Value</label><input className="fc" value={triggerValue} onChange={e => setTriggerValue(e.target.value)} placeholder="e.g., 0 9 * * *"/></div>}
          </div>
          <div className="fg"><label>Execution Strategy</label>
            <select className="fc" value={strategy} onChange={e => setStrategy(e.target.value)}>
              <option value="sequential">Sequential</option><option value="parallel">Parallel</option><option value="conditional(skip-delays)">Conditional (skip delays)</option>
            </select>
          </div>
          <div className="fg"><label>Tasks</label>
            {tasks.map((t, i) => (
              <div key={i} className="tb">
                {tasks.length > 1 && <button className="btn-i btn-sm rt" onClick={() => setTasks(ts => ts.filter((_, j) => j !== i))}>✕</button>}
                <div className="fr">
                  <div className="fg" style={{marginBottom:8}}><label>Task Name</label><input className="fc" value={t.name} onChange={e => updateTask(i, 'name', e.target.value)} placeholder="e.g., Fetch Users"/></div>
                  <div className="fg" style={{marginBottom:8}}><label>Task Type</label>
                    <select className="fc" value={t.type} onChange={e => updateTask(i, 'type', e.target.value)}>
                      {Object.keys(TASK_PARAMS).map(tp => <option key={tp} value={tp}>{tp}</option>)}
                    </select>
                  </div>
                </div>
                {(TASK_PARAMS[t.type] || []).map(([k, label]) => (
                  <div key={k} style={{display:'flex',gap:8,marginBottom:4}}>
                    <input className="fc" style={{fontSize:12}} placeholder={label} value={t.params[k] || ''} onChange={e => updateTask(i, k, e.target.value)}/>
                  </div>
                ))}
              </div>
            ))}
            <button className="btn btn-s btn-sm" style={{marginTop:8}} onClick={() => setTasks(ts => [...ts, { name: '', type: 'http', params: {} }])}>+ Add Task</button>
          </div>
        </div>
        <div style={{padding:'14px 22px',borderTop:'1px solid var(--bdr)',display:'flex',justifyContent:'flex-end',gap:10}}>
          <button className="btn btn-s" onClick={onBack}>Cancel</button>
          <button className="btn btn-p" onClick={submit}>Create Workflow</button>
        </div>
      </div>
    </div>
  );
}

// ── App Root ──
function App() {
  const [theme, setTheme] = useState(localStorage.getItem('ff_t') || 'light');
  const [user, setUser] = useState(null);
  const [page, setPage] = useState('loading');
  const [pageParam, setPageParam] = useState(null);

  useEffect(() => { document.documentElement.setAttribute('data-theme', theme); }, [theme]);

  const toggleTheme = () => {
    const next = theme === 'light' ? 'dark' : 'light';
    setTheme(next); localStorage.setItem('ff_t', next);
  };

  useEffect(() => {
    if (sessionId) {
      api('GET', '/api/auth/me').then(u => { setUser(u); setPage('dash'); }).catch(() => { sessionId = null; localStorage.removeItem('ff_s'); setPage('auth'); });
    } else { setPage('auth'); }
  }, []);

  const navigate = (pg, param) => { setPage(pg); setPageParam(param); };
  const handleLogin = (u) => { setUser(u); setPage('dash'); };
  const handleLogout = () => { api('POST', '/api/auth/logout').catch(() => {}); sessionId = null; setUser(null); localStorage.removeItem('ff_s'); setPage('auth'); };

  if (page === 'loading') return <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh'}}><div className="spinner"/></div>;
  if (page === 'auth') return <AuthPage onLogin={handleLogin} theme={theme} onToggleTheme={toggleTheme} />;

  return (
    <div style={{display:'flex',flexDirection:'column',minHeight:'100vh'}}>
      <Navbar user={user} onLogout={handleLogout} theme={theme} onToggleTheme={toggleTheme} onHome={() => navigate('dash')} />
      {page === 'dash' && <Dashboard onNavigate={navigate} />}
      {page === 'detail' && <WorkflowDetail workflowId={pageParam} onBack={() => navigate('dash')} />}
      {page === 'create' && <CreateWorkflow onBack={() => navigate('dash')} onCreated={() => navigate('dash')} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
